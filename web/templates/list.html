{{define "content"}}
	<h1>{{.Title}}</h1>
	<div class="list">
		{{range .Items}}
			<div class="list-item">
				{{if eq $.Type "artist"}}
					<a href="/artists/{{.Value}}">{{.Label}}</a> ({{.Count}}) · <a href="/?artist={{.Value}}">filter</a>
				{{else}}
					<a href="/?{{$.Type}}={{.Value}}">{{.Label}} ({{.Count}})</a>
				{{end}}
			</div>
		{{end}}
	</div>
{{end}}
